<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Node.js Express Backend Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>

    <h1>Node.js Express Backend Demo</h1>

    <button onclick="getData()">Fetch Data from Express API</button>

    <div id="result">Click the button to fetch data.</div>

    <script>
        function getData() {
            fetch("http://localhost:3000/api")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("result").innerHTML =
                        "<strong>Message:</strong> " + data.message;
                })
                .catch(error => {
                    document.getElementById("result").innerHTML =
                        "Express API not running!";
                    console.error(error);
                });
        }
    </script>

</body>
</html>
